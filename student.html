<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Directory · Firebase</title>

    <style>
        /* ============================================================
           EXACT CARD DESIGN FROM student.html + background
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        }

        body {
            min-height: 100vh;
            padding: 40px 20px 60px;
            overflow-x: hidden;
            background:
                radial-gradient(circle at 20% 20%, rgba(20, 184, 166, 0.18), transparent 40%),
                radial-gradient(circle at 80% 30%, rgba(249, 115, 22, 0.15), transparent 45%),
                radial-gradient(circle at 50% 80%, rgba(59, 130, 246, 0.12), transparent 40%),
                linear-gradient(135deg, #fefcfb, #f1f5f9);
        }

        body::before {
            content: "";
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(20, 184, 166, 0.20), transparent 70%);
            top: -150px;
            left: -150px;
            filter: blur(55px);
            animation: float 10s infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: "";
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(249, 115, 22, 0.18), transparent 70%);
            bottom: -150px;
            right: -150px;
            filter: blur(55px);
            animation: float2 12s infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes float {
            from {
                transform: translate(0, 0);
            }
            to {
                transform: translate(70px, 50px);
            }
        }

        @keyframes float2 {
            from {
                transform: translate(0, 0);
            }
            to {
                transform: translate(-70px, -50px);
            }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* --- header & search (same as student.html) --- */
        .header-section {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 20px 30px;
            margin-bottom: 40px;
        }

        .title {
            color: #0f172a;
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .title span {
            color: #14b8a6;
            text-shadow: 0 0 15px rgba(20, 184, 166, 0.25);
        }

        .search-wrapper {
            flex: 1 1 320px;
            min-width: 220px;
            position: relative;
        }

        .search-icon-svg {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 22px;
            height: 22px;
            color: #14b8a6;
            opacity: 0.7;
            pointer-events: none;
        }

        #searchInput {
            width: 100%;
            padding: 16px 20px 16px 54px;
            border: 1px solid rgba(15, 23, 42, 0.10);
            border-radius: 60px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(8px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
            font-size: 1rem;
            font-weight: 500;
            color: #0f172a;
            transition: all 0.3s ease;
            outline: none;
        }

        #searchInput:focus {
            border-color: #f97316;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 8px 28px rgba(249, 115, 22, 0.18);
        }

        #searchInput::placeholder {
            color: #94a3b8;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        /* --- CARD GRID (exact from student.html) --- */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 28px;
        }

        .card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(15, 23, 42, 0.08);
            border-radius: 28px;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
            opacity: 1;
            transform: scale(1);
            transform-origin: top center;
        }

        .card.hidden-card {
            display: none;
            opacity: 0;
            transform: scale(0.96);
            pointer-events: none;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: #f97316;
            box-shadow: 0 15px 40px rgba(249, 115, 22, 0.15);
        }

        .top {
            padding: 28px 20px 20px;
            text-align: center;
            background: linear-gradient(135deg, rgba(20, 184, 166, 0.12), rgba(249, 115, 22, 0.10));
        }

        .top img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #14b8a6;
            box-shadow: 0 0 15px rgba(20, 184, 166, 0.25);
            background: white;
        }

        .top h2 {
            color: #0f172a;
            margin-top: 14px;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .top p {
            color: #f97316;
            font-weight: 600;
            letter-spacing: 0.3px;
            margin-top: 4px;
        }

        .info {
            padding: 18px 22px 22px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(15, 23, 42, 0.05);
        }

        .row:last-of-type {
            border-bottom: none;
        }

        .label {
            color: #14b8a6;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
        }

        .value {
            color: #0f172a;
            font-weight: 500;
        }

        .address {
            margin-top: 16px;
            padding-top: 8px;
            border-top: 1px solid rgba(15, 23, 42, 0.05);
        }

        .address h4 {
            color: #f97316;
            margin-bottom: 6px;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        .address p {
            color: #334155;
            line-height: 1.5;
            font-weight: 450;
        }

        /* --- no result (same as student.html) --- */
        .no-result {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            font-size: 1.4rem;
            font-weight: 500;
            color: #475569;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(6px);
            border-radius: 48px;
            border: 1px dashed rgba(20, 184, 166, 0.3);
        }

        .no-result.hidden {
            display: none;
        }

        /* --- loading / error (kept from original code, styled to match) --- */
        .state-message {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            text-align: center;
            background: rgba(255, 255, 255, 0.60);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            border: 1px dashed rgba(20, 184, 166, 0.3);
            min-height: 300px;
            gap: 1rem;
        }

        .state-message .spinner {
            font-size: 2.8rem;
            color: #14b8a6;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .state-message h2 {
            font-size: 1.4rem;
            font-weight: 600;
            color: #0f172a;
        }
        .state-message p {
            color: #64748b;
            max-width: 360px;
            font-size: 0.95rem;
        }
        .state-message .error-icon {
            color: #ef4444;
            opacity: 0.7;
            font-size: 2.8rem;
        }
        .state-message .retry-btn {
            margin-top: 0.5rem;
            background: rgba(249, 115, 22, 0.12);
            color: #f97316;
            border: none;
            padding: 0.6rem 1.8rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .state-message .retry-btn:hover {
            background: rgba(249, 115, 22, 0.20);
        }

        /* --- responsive (same as student.html) --- */
        @media (max-width: 768px) {
            .title {
                font-size: 2.2rem;
            }
            .header-section {
                flex-direction: column;
                align-items: stretch;
            }
            .search-wrapper {
                flex: 1 1 auto;
            }
            #searchInput {
                padding: 14px 20px 14px 52px;
                font-size: 0.95rem;
            }
            .card:hover {
                transform: translateY(-4px) scale(1.01);
            }
        }

        @media (max-width: 480px) {
            .title {
                font-size: 1.8rem;
            }
            .top img {
                width: 96px;
                height: 96px;
            }
            .info {
                padding: 14px 16px 18px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- HEADER (exact from student.html) -->
        <div class="header-section">
            <h1 class="title">Student <span>Directory</span></h1>

            <div class="search-wrapper">
                <svg class="search-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
                <input type="text" id="searchInput" placeholder="Search by name, ID, or department..." autocomplete="off">
            </div>
        </div>

        <!-- CARDS GRID -->
        <div class="cards" id="cardsContainer">
            <!-- cards injected by JavaScript -->
        </div>

    </div>

    <!-- ============================================================= -->
    <!-- FIREBASE — ES Module (v11+)                                    -->
    <!-- ============================================================= -->
    <script type="module">
        // ================================================================
        //  1)  FIREBASE CONFIG
        // ================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyA0fKdqe8ZQUK-Ys2L6Gm5x53i2ZdyOjrE",
            authDomain: "hbuc-student.firebaseapp.com",
            projectId: "hbuc-student",
            storageBucket: "hbuc-student.firebasestorage.app",
            messagingSenderId: "370097429274",
            appId: "1:370097429274:web:9f6e78032af050eddbaaa3",
            databaseURL: "https://hbuc-student-default-rtdb.firebaseio.com"
        };

        // ================================================================
        //  2)  IMPORTS
        // ================================================================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
        import {
            getFirestore,
            collection,
            onSnapshot,
            query,
            // orderBy removed — we sort in JavaScript for numeric roll ordering
        } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
        import {
            getDatabase
        } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js";

        // ================================================================
        //  3)  INIT
        // ================================================================
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const rtdb = getDatabase(app);
        console.log("✅ Firebase Connected");

        // ================================================================
        //  4)  DOM REFS
        // ================================================================
        const container = document.getElementById('cardsContainer');
        const searchInput = document.getElementById('searchInput');

        // ================================================================
        //  5)  STATE
        // ================================================================
        let allStudents = [];
        let filteredStudents = [];
        let unsubscribe = null;
        let isFirstLoad = true;

        // ================================================================
        //  6)  XSS SAFETY
        // ================================================================
        function escapeHtml(text) {
            if (text == null) return '';
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return String(text).replace(/[&<>"']/g, function(m) {
                return map[m];
            });
        }

        // ================================================================
        //  7)  RENDER  — exact card structure from student.html
        // ================================================================
        function renderStudents(list) {
            container.innerHTML = '';

            if (!list || list.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'no-result';
                empty.innerHTML = `
                            <span style="display:block; font-size:2.2rem; margin-bottom:10px;">🔍</span>
                            No student found. Try a different roll or name.
                        `;
                container.appendChild(empty);
                return;
            }

            list.forEach((student) => {
                const card = document.createElement('div');
                card.className = 'card';

                // ---- data attributes for search (matching student.html) ----
                card.setAttribute('data-name', student.name || '');
                card.setAttribute('data-id', student.roll || '');
                card.setAttribute('data-dept', student.department || '');
                card.setAttribute('data-phone', student.phone || '');
                card.setAttribute('data-address', student.address || '');

                // ---- TOP ----
                const top = document.createElement('div');
                top.className = 'top';

                const img = document.createElement('img');
                img.src = (student.image && student.image.trim() !== '') ? student.image : '';
                img.alt = escapeHtml(student.name) || 'Student';
                // if image fails, keep alt visible
                img.onerror = function() {
                    this.style.display = 'none';
                };

                const h2 = document.createElement('h2');
                h2.textContent = student.name || 'Unnamed';

                const p = document.createElement('p');
                p.textContent = 'Student';

                top.appendChild(img);
                top.appendChild(h2);
                top.appendChild(p);

                // ---- INFO ----
                const info = document.createElement('div');
                info.className = 'info';

                // Year
                const row1 = document.createElement('div');
                row1.className = 'row';
                const l1 = document.createElement('span');
                l1.className = 'label';
                l1.textContent = 'Year';
                const v1 = document.createElement('span');
                v1.className = 'value';
                v1.textContent = student.year && student.year.trim() ? student.year : '—';
                row1.appendChild(l1);
                row1.appendChild(v1);

                // Department
                const row2 = document.createElement('div');
                row2.className = 'row';
                const l2 = document.createElement('span');
                l2.className = 'label';
                l2.textContent = 'Department';
                const v2 = document.createElement('span');
                v2.className = 'value';
                v2.textContent = student.department && student.department.trim() ? student.department : '—';
                row2.appendChild(l2);
                row2.appendChild(v2);

                // Roll
                const row3 = document.createElement('div');
                row3.className = 'row';
                const l3 = document.createElement('span');
                l3.className = 'label';
                l3.textContent = 'Roll';
                const v3 = document.createElement('span');
                v3.className = 'value';
                v3.textContent = student.roll && student.roll.trim() ? student.roll : '—';
                row3.appendChild(l3);
                row3.appendChild(v3);

                // Phone
                const row4 = document.createElement('div');
                row4.className = 'row';
                const l4 = document.createElement('span');
                l4.className = 'label';
                l4.textContent = 'Phone';
                const v4 = document.createElement('span');
                v4.className = 'value';
                v4.textContent = student.phone && student.phone.trim() ? student.phone : '—';
                row4.appendChild(l4);
                row4.appendChild(v4);

                // ---- ADDRESS ----
                const address = document.createElement('div');
                address.className = 'address';
                const h4 = document.createElement('h4');
                h4.textContent = 'Address';
                const addrP = document.createElement('p');
                addrP.textContent = student.address && student.address.trim() ? student.address : '—';
                address.appendChild(h4);
                address.appendChild(addrP);

                // assemble info
                info.appendChild(row1);
                info.appendChild(row2);
                info.appendChild(row3);
                info.appendChild(row4);
                info.appendChild(address);

                // assemble card
                card.appendChild(top);
                card.appendChild(info);

                container.appendChild(card);
            });
        }

        // ================================================================
        //  8)  SEARCH  (matches student.html logic)
        // ================================================================
        function filterCards(query) {
            const cleanQuery = query.trim().toLowerCase();
            let visibleCount = 0;

            // get all card elements
            const cards = container.querySelectorAll('.card');
            const noResult = container.querySelector('.no-result');

            cards.forEach(card => {
                const name = (card.getAttribute('data-name') || '').toLowerCase();
                const id = (card.getAttribute('data-id') || '').toLowerCase();
                const dept = (card.getAttribute('data-dept') || '').toLowerCase();
                const phone = (card.getAttribute('data-phone') || '').toLowerCase();
                const address = (card.getAttribute('data-address') || '').toLowerCase();

                // also get text from .value fields (year, etc.)
                const infoRows = card.querySelectorAll('.row .value');
                let extraText = '';
                infoRows.forEach(el => {
                    extraText += ' ' + (el.textContent || '').toLowerCase();
                });
                const addressP = card.querySelector('.address p');
                if (addressP) {
                    extraText += ' ' + (addressP.textContent || '').toLowerCase();
                }

                const fullText = name + ' ' + id + ' ' + dept + ' ' + phone + ' ' + address + extraText;

                if (cleanQuery === '') {
                    card.classList.remove('hidden-card');
                    visibleCount++;
                    return;
                }

                const match = fullText.includes(cleanQuery);
                if (match) {
                    card.classList.remove('hidden-card');
                    visibleCount++;
                } else {
                    card.classList.add('hidden-card');
                }
            });

            // toggle no-result
            if (noResult) {
                if (visibleCount === 0 && cleanQuery !== '') {
                    noResult.classList.remove('hidden');
                } else {
                    noResult.classList.add('hidden');
                }
            }
        }

        // ================================================================
        //  9)  LOADING / ERROR
        // ================================================================
        function showLoading() {
            container.innerHTML = `
                        <div class="state-message">
                            <div class="spinner">⟳</div>
                            <h2>Loading students…</h2>
                            <p>Please wait while we fetch the latest data.</p>
                        </div>
                    `;
        }

        function showError(err) {
            const msg = getUserFriendlyError(err);
            console.error('❌ Firestore Error:', err);
            container.innerHTML = `
                        <div class="state-message">
                            <div class="error-icon">⚠</div>
                            <h2>${msg.title}</h2>
                            <p>${msg.message}</p>
                            <button class="retry-btn" id="retryBtn">⟳ Retry</button>
                        </div>
                    `;
            const retryBtn = document.getElementById('retryBtn');
            if (retryBtn) {
                retryBtn.addEventListener('click', () => {
                    startListening();
                });
            }
        }

        function getUserFriendlyError(err) {
            const code = err?.code || '';
            if (code === 'permission-denied') {
                return {
                    title: 'Access Denied',
                    message: 'You do not have permission to read student data. Please check your Firestore security rules.'
                };
            }
            if (code === 'failed-precondition' || code === 'not-found') {
                return {
                    title: 'Missing Index',
                    message: 'A required Firestore index is missing. Please create the index from the Firebase console.'
                };
            }
            if (code === 'unavailable' || code === 'deadline-exceeded') {
                return {
                    title: 'Network Error',
                    message: 'The network is unavailable or slow. Please check your connection and try again.'
                };
            }
            return {
                title: 'Something went wrong',
                message: err.message || 'Could not load students. Please try again later.'
            };
        }

        // ================================================================
        //  10)  START LISTENING  —  NUMERIC SORT BY ROLL (1,2,3,…)
        // ================================================================
        function startListening() {
            if (unsubscribe) {
                unsubscribe();
                unsubscribe = null;
            }

            showLoading();

            const studentsCol = collection(db, 'students');

            // ★★★  NO orderBy() — we sort numerically in JavaScript  ★★★
            const q = query(studentsCol);

            try {
                unsubscribe = onSnapshot(
                    q,
                    (snapshot) => {
                        const students = [];
                        snapshot.forEach((doc) => {
                            const data = doc.data();
                            students.push({
                                id: doc.id,
                                name: data.name || '',
                                roll: data.roll || '',
                                year: data.year || '',
                                department: data.department || '',
                                phone: data.phone || '',
                                address: data.address || '',
                                image: data.image || '',
                                createdAt: data.createdAt || null,
                            });
                        });

                        // ★★★  NUMERIC SORT BY ROLL (1,2,3,10… NOT 1,10,2,3)  ★★★
                        students.sort((a, b) => {
                            const rollA = a.roll !== undefined && a.roll !== '' ? Number(a.roll) : 0;
                            const rollB = b.roll !== undefined && b.roll !== '' ? Number(b.roll) : 0;
                            return rollA - rollB;
                        });

                        allStudents = students;
                        const currentTerm = searchInput.value || '';
                        renderStudents(allStudents);

                        // apply search after render
                        filterCards(currentTerm);

                        if (isFirstLoad) {
                            console.log(`✅ Students Loaded (${allStudents.length} records) — numerically sorted by roll`);
                            isFirstLoad = false;
                        } else {
                            console.log(`🔄 Students Updated (${allStudents.length} records) — numerically sorted by roll`);
                        }
                    },
                    (error) => {
                        if (error.code === 'cancelled') return;
                        showError(error);
                    }
                );
            } catch (err) {
                showError(err);
            }
        }

        // ================================================================
        //  11)  SEARCH EVENT BINDING
        // ================================================================
        let debounceTimer;
        searchInput.addEventListener('input', function(e) {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                filterCards(this.value);
            }, 120);
        });

        // ================================================================
        //  12)  GO
        // ================================================================
        startListening();

        // expose for debugging
        window.__studentDebug = {
            allStudents: () => [...allStudents],
            refresh: startListening,
        };

        console.log('✅ Student Directory ready — live updates from Firestore (numerically sorted by roll).');
    </script>

</body>
</html>
